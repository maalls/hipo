global:
  scrape_interval: 5s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['prometheus:9090']

  - job_name: node
    static_configs:
      - targets: ['192.168.1.10:9100']

  - job_name: nvidia
    static_configs:
      - targets: ['192.168.1.10:9400']

  - job_name: 'shelly'
    static_configs:
      - targets: ['192.168.1.10:9101']
